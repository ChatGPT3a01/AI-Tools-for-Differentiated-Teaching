<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0ebf8; width: 780px; min-height: 50px; }
  .form-container { max-width: 640px; margin: 0 auto; padding: 20px 0; }
  .form-header {
    background: #fff; border-radius: 8px; overflow: hidden;
    border: 1px solid #dadce0; margin-bottom: 12px;
  }
  .form-header-bar { height: 10px; background: #673ab7; }
  .form-header-content { padding: 24px; }
  .form-title { font-size: 24px; color: #202124; font-weight: 400; margin-bottom: 8px; }
  .form-desc { font-size: 14px; color: #5f6368; line-height: 1.6; }
  .form-section {
    background: #fff; border-radius: 8px; border: 1px solid #dadce0;
    margin-bottom: 12px; padding: 24px;
  }
  .form-section.active { border-left: 4px solid #673ab7; }
  .section-header {
    font-size: 16px; font-weight: 500; color: #202124; margin-bottom: 16px;
    padding-bottom: 8px; border-bottom: 1px solid #e0e0e0;
  }
  .question-text { font-size: 14px; color: #202124; margin-bottom: 16px; line-height: 1.6; }
  .question-required::after { content: ' *'; color: #d93025; }
  .text-input {
    width: 100%; border: none; border-bottom: 1px solid #dadce0;
    padding: 8px 0; font-size: 14px; color: #999; outline: none;
  }
  .radio-group { margin-top: 8px; }
  .radio-item {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0; font-size: 14px; color: #3c4043;
  }
  .radio-circle {
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid #5f6368; flex-shrink: 0;
  }
  .hint-section {
    background: #fff; border-radius: 8px; border: 1px solid #dadce0;
    margin-bottom: 12px; padding: 24px; border-left: 4px solid #fbbc04;
  }
  .hint-label { font-size: 14px; font-weight: 500; color: #7c5e00; margin-bottom: 10px; }
  .hint-content {
    background: #fef7e0; padding: 12px 16px; border-radius: 6px;
    font-size: 14px; color: #3c4043; line-height: 1.6;
  }
  .submit-area { text-align: left; padding: 8px 0; }
  .submit-btn {
    background: #673ab7; color: #fff; border: none;
    padding: 10px 24px; border-radius: 4px; font-size: 14px;
    cursor: pointer;
  }
  .form-footer { text-align: center; padding: 16px; font-size: 12px; color: #999; }
</style>
</head>
<body>
  <div class="form-container">
    <!-- Header -->
    <div class="form-header">
      <div class="form-header-bar"></div>
      <div class="form-header-content">
        <div class="form-title">動態評量 - 2026/3/9</div>
        <div class="form-desc">
          這是一份動態評量，答錯時會獲得提示，幫助你逐步理解概念。<br>
          每使用一次提示扣 1 分，滿分依題目而定。請盡力作答！
        </div>
      </div>
    </div>

    <!-- Question Section -->
    <div class="form-section active">
      <div class="section-header">第 1 題（知識點：F=ma 的應用）</div>
      <div class="question-text question-required">
        一個 5 kg 的物體受到 20 N 的水平力推動，在光滑水平面上，求此物體的加速度？
      </div>
      <input class="text-input" type="text" placeholder="你的答案" readonly>
    </div>

    <!-- Hint Request -->
    <div class="form-section">
      <div class="question-text question-required" style="font-weight:500;">
        第 1 題：需要提示嗎？
      </div>
      <div class="radio-group">
        <div class="radio-item">
          <div class="radio-circle"></div>
          <span>不需要，我要挑戰滿分！</span>
        </div>
        <div class="radio-item">
          <div class="radio-circle"></div>
          <span>需要提示（扣1分）</span>
        </div>
      </div>
    </div>

    <!-- Hint Area -->
    <div class="hint-section">
      <div class="hint-label">💡 第 1 題 - 提示區</div>
      <div class="hint-content">
        這題要用到<strong>牛頓第二定律</strong>喔！想一想力、質量和加速度的關係。<br>
        公式是 F = ma，其中 F 是力，m 是質量，a 是加速度。
      </div>
    </div>

    <!-- Submit -->
    <div class="submit-area">
      <button class="submit-btn">下一頁</button>
    </div>

    <div class="form-footer">Google 表單</div>
  </div>
</body>
</html>
