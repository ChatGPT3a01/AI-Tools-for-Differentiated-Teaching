<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; width: 780px; }
  .toolbar { background: #f0f4f0; padding: 4px 8px; border-bottom: 1px solid #c0c0c0; }
  .toolbar .title { color: #188038; font-size: 18px; font-weight: 500; }
  .sheet-grid table { border-collapse: collapse; width: 100%; font-size: 13px; }
  .sheet-grid th, .sheet-grid td { border: 1px solid #e2e2e2; padding: 8px 12px; text-align: center; }
  .header-blue { background: #4285f4; color: #fff; font-weight: 600; font-size: 13px; }
  .unit-cell { text-align: left; font-weight: 500; background: #f8f9fa; color: #202124; }
  .has-q { background: #e8f5e9; color: #1b5e20; font-weight: 500; }
  .no-q { color: #bdbdbd; }
  .row-num { background: #f8f9fa; color: #999; text-align: center; width: 30px; font-size: 11px; }
  .sheet-tabs { background: #f0f0f0; padding: 4px 8px; display: flex; gap: 2px; border-top: 1px solid #c0c0c0; }
  .tab { background: #fff; border: 1px solid #c0c0c0; border-bottom: none; padding: 6px 16px; font-size: 12px; border-radius: 4px 4px 0 0; }
  .tab.active { border-bottom: 2px solid #4285f4; font-weight: 500; color: #1a73e8; }
</style>
</head>
<body>
  <div class="toolbar"><span class="title">📊 段考AI審題助手</span></div>
  <div class="sheet-grid">
    <table>
      <tr>
        <th class="row-num"></th>
        <th class="header-blue">單元 ＼ 認知層次</th>
        <th class="header-blue">記憶</th>
        <th class="header-blue">理解</th>
        <th class="header-blue">應用</th>
        <th class="header-blue">分析</th>
        <th class="header-blue">評鑑</th>
        <th class="header-blue">創造</th>
      </tr>
      <tr>
        <td class="row-num">2</td>
        <td class="unit-cell">牛頓運動定律</td>
        <td class="has-q">1, 3</td>
        <td class="has-q">2</td>
        <td class="has-q">5</td>
        <td class="has-q">10</td>
        <td class="no-q">—</td>
        <td class="no-q">—</td>
      </tr>
      <tr>
        <td class="row-num">3</td>
        <td class="unit-cell">運動學</td>
        <td class="has-q">4</td>
        <td class="has-q">6</td>
        <td class="has-q">8</td>
        <td class="no-q">—</td>
        <td class="no-q">—</td>
        <td class="no-q">—</td>
      </tr>
      <tr>
        <td class="row-num">4</td>
        <td class="unit-cell">功與能</td>
        <td class="no-q">—</td>
        <td class="has-q">7</td>
        <td class="has-q">9, 11</td>
        <td class="has-q">15</td>
        <td class="no-q">—</td>
        <td class="no-q">—</td>
      </tr>
      <tr>
        <td class="row-num">5</td>
        <td class="unit-cell">動量與衝量</td>
        <td class="has-q">12</td>
        <td class="has-q">13</td>
        <td class="no-q">—</td>
        <td class="no-q">—</td>
        <td class="no-q">—</td>
        <td class="no-q">—</td>
      </tr>
      <tr>
        <td class="row-num">6</td>
        <td class="unit-cell" style="color: #ea4335;">萬有引力</td>
        <td class="no-q" style="background:#fce8e6;">—</td>
        <td class="no-q" style="background:#fce8e6;">—</td>
        <td class="no-q" style="background:#fce8e6;">—</td>
        <td class="no-q" style="background:#fce8e6;">—</td>
        <td class="no-q" style="background:#fce8e6;">—</td>
        <td class="no-q" style="background:#fce8e6;">—</td>
      </tr>
      <tr>
        <td class="row-num">7</td>
        <td class="unit-cell">簡諧運動</td>
        <td class="no-q">—</td>
        <td class="has-q">14</td>
        <td class="no-q">—</td>
        <td class="no-q">—</td>
        <td class="no-q">—</td>
        <td class="no-q">—</td>
      </tr>
    </table>
  </div>
  <div style="padding: 8px 12px; background: #fce8e6; border-left: 4px solid #ea4335; margin: 8px; font-size: 13px; color: #c5221f;">
    🔴 「萬有引力」整個單元都沒有出到題目！建議補充。
  </div>
  <div class="sheet-tabs">
    <div class="tab active">雙向細目表</div>
    <div class="tab">難易度分析</div>
    <div class="tab">檢核與建議</div>
    <div class="tab">Sheet1</div>
  </div>
</body>
</html>
