<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; width: 780px; }
  .as-header { background: #4285f4; padding: 8px 16px; color: #fff; font-size: 16px; font-weight: 500; }
  .main-area { display: flex; }
  .sidebar { width: 220px; background: #f8f9fa; border-right: 1px solid #e0e0e0; padding: 12px; min-height: 50px; }
  .sidebar-title { font-size: 12px; color: #5f6368; text-transform: uppercase; margin-bottom: 8px; font-weight: 500; }
  .sidebar-item { padding: 8px 12px; font-size: 13px; color: #5f6368; border-radius: 4px; margin: 2px 0; cursor: pointer; display: flex; align-items: center; gap: 8px; }
  .sidebar-item.active { background: #e8f0fe; color: #1a73e8; font-weight: 500; }
  .content { flex: 1; padding: 24px; }
  .section-title { font-size: 18px; color: #202124; font-weight: 400; margin-bottom: 20px; }
  .sub-title { font-size: 14px; color: #5f6368; margin-bottom: 12px; }
  .prop-table { border: 1px solid #dadce0; border-radius: 8px; overflow: hidden; margin-top: 8px; }
  .prop-header { background: #f1f3f4; display: flex; padding: 10px 16px; font-size: 13px; color: #5f6368; font-weight: 500; }
  .prop-row { display: flex; padding: 10px 16px; border-top: 1px solid #dadce0; align-items: center; }
  .prop-key { flex: 1; font-size: 14px; color: #202124; font-weight: 500; }
  .prop-val { flex: 2; font-size: 14px; color: #5f6368; font-family: monospace; }
  .btn-add { background: #1a73e8; color: #fff; border: none; border-radius: 4px; padding: 8px 20px; font-size: 13px; cursor: pointer; margin-top: 12px; }
  .btn-save { background: #1a73e8; color: #fff; border: none; border-radius: 4px; padding: 8px 20px; font-size: 13px; cursor: pointer; margin-top: 12px; margin-left: 8px; }
  .callout { background: #e6f4ea; border: 2px solid #34a853; border-radius: 8px; padding: 12px 16px; font-size: 14px; color: #137333; font-weight: 500; margin-top: 16px; }
  .callout2 { background: #fce8e6; border: 2px solid #ea4335; border-radius: 8px; padding: 12px 16px; font-size: 14px; color: #c5221f; font-weight: 500; margin-top: 12px; }
</style>
</head>
<body>
  <div class="as-header">Apps Script — 專案設定</div>
  <div class="main-area">
    <div class="sidebar">
      <div class="sidebar-title">設定</div>
      <div class="sidebar-item">
        <span>{ }</span> 編輯器
      </div>
      <div class="sidebar-item active">
        <span>⚙️</span> 專案設定
      </div>
    </div>
    <div class="content">
      <div class="section-title">專案設定</div>

      <div style="margin-top: 24px;">
        <div class="sub-title">一般</div>
        <div style="font-size:13px; color:#5f6368; padding: 8px 0;">執行階段版本：V8</div>
      </div>

      <div style="margin-top: 32px;">
        <div style="font-size: 16px; color: #202124; font-weight: 500; margin-bottom: 12px;">指令碼屬性</div>
        <div class="prop-table">
          <div class="prop-header">
            <div style="flex:1;">屬性</div>
            <div style="flex:2;">值</div>
          </div>
          <div class="prop-row" style="background: #fffde7;">
            <div class="prop-key" style="color: #1a73e8;">GEMINI_API_KEY</div>
            <div class="prop-val">AIzaSyB••••••••••••••••••••••••••••</div>
          </div>
        </div>
        <button class="btn-add">＋ 新增指令碼屬性</button>
        <button class="btn-save">儲存指令碼屬性</button>
      </div>

      <div class="callout">
        ✅ 屬性名稱填：<code>GEMINI_API_KEY</code>（一個字都不能錯）<br>
        ✅ 值填入你的 API 金鑰（從 Google AI Studio 複製的那串）
      </div>
      <div class="callout2">
        ⚠️ API 金鑰等同密碼，不要分享或貼在公開文件！
      </div>
    </div>
  </div>
</body>
</html>
