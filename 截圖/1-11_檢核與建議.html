<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; width: 780px; }
  .toolbar { background: #f0f4f0; padding: 4px 8px; border-bottom: 1px solid #c0c0c0; }
  .toolbar .title { color: #188038; font-size: 18px; font-weight: 500; }
  .section-title { font-size: 16px; font-weight: 700; color: #202124; padding: 18px 16px 10px; }
  .content-area { padding: 0 16px; }
  .check-row {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px; margin-bottom: 6px;
    background: #f8f9fa; border-left: 4px solid #fbbc04;
    border-radius: 0 6px 6px 0; font-size: 14px; color: #3c4043; line-height: 1.5;
  }
  .check-row.warning { border-left-color: #ea4335; background: #fce8e6; }
  .check-row.info { border-left-color: #4285f4; background: #e8f0fe; }
  .check-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .suggestion-list { padding: 0 16px; }
  .suggestion-item {
    padding: 10px 14px; margin-bottom: 6px;
    background: #e6f4ea; border-left: 4px solid #34a853;
    border-radius: 0 6px 6px 0; font-size: 14px; color: #1e4620; line-height: 1.5;
  }
  .sheet-tabs { background: #f0f0f0; padding: 4px 8px; display: flex; gap: 2px; border-top: 1px solid #c0c0c0; margin-top: 16px; }
  .tab { background: #fff; border: 1px solid #c0c0c0; border-bottom: none; padding: 6px 16px; font-size: 12px; border-radius: 4px 4px 0 0; cursor: default; }
  .tab.active { border-bottom: 2px solid #4285f4; font-weight: 500; color: #1a73e8; }
</style>
</head>
<body>
  <div class="toolbar"><span class="title">📊 段考AI審題助手</span></div>

  <div class="section-title">覆蓋率檢核</div>
  <div class="content-area">
    <div class="check-row">
      <span class="check-icon">⚠️</span>
      <span>出題偏多的單元：牛頓運動定律（6題）</span>
    </div>
    <div class="check-row warning">
      <span class="check-icon">🔴</span>
      <span>未覆蓋的單元：萬有引力</span>
    </div>
    <div class="check-row info">
      <span class="check-icon">📊</span>
      <span>難度均衡性：中等題偏多（53%），建議增加基礎與進階題比例</span>
    </div>
  </div>

  <div class="section-title">改進建議</div>
  <div class="suggestion-list">
    <div class="suggestion-item">1. 建議增加萬有引力相關試題（至少 2 題）</div>
    <div class="suggestion-item">2. 可加入跨單元整合題以提升分析層次</div>
    <div class="suggestion-item">3. 評鑑與創造層次的題目偏少，建議增加開放式問答</div>
    <div class="suggestion-item">4. 難易度建議調整為 簡單30% / 中等40% / 困難30%</div>
  </div>

  <div class="sheet-tabs">
    <div class="tab">雙向細目表</div>
    <div class="tab">難易度分析</div>
    <div class="tab active">檢核與建議</div>
    <div class="tab">Sheet1</div>
  </div>
</body>
</html>
