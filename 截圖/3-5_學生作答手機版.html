<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f0f0; width: 780px; display: flex; justify-content: center; padding: 24px 0 32px; }
  .phone-frame { width: 360px; height: 720px; background: #000; border-radius: 36px; padding: 12px; box-shadow: 0 8px 40px rgba(0,0,0,0.25); position: relative; }
  .phone-notch { width: 120px; height: 24px; background: #000; border-radius: 0 0 14px 14px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); z-index: 10; }
  .phone-screen { width: 100%; height: 100%; background: #fff; border-radius: 26px; overflow-y: auto; overflow-x: hidden; position: relative; }
  /* Status bar */
  .status-bar { background: #7b1fa2; padding: 8px 16px 4px; display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.9); }
  /* Form header */
  .form-header { background: #7b1fa2; padding: 0 0 16px; }
  .form-header-inner { background: #fff; margin: 0 12px; border-radius: 10px; padding: 16px; border-top: 8px solid #7b1fa2; }
  .form-title { font-size: 22px; color: #202124; font-weight: 400; margin-bottom: 4px; }
  .form-desc { font-size: 13px; color: #5f6368; }
  /* Question cards */
  .form-body { padding: 8px 12px 16px; }
  .q-card { background: #fff; border-radius: 10px; border: 1px solid #dadce0; padding: 16px; margin-bottom: 10px; border-left: 4px solid #7b1fa2; }
  .q-label { font-size: 14px; color: #202124; line-height: 1.6; margin-bottom: 10px; }
  .q-label .required { color: #d93025; margin-left: 2px; }
  .q-input { width: 100%; border: none; border-bottom: 1px solid #dadce0; padding: 8px 0; font-size: 14px; color: #202124; outline: none; font-family: 'Segoe UI', Arial, sans-serif; }
  .q-input::placeholder { color: #9aa0a6; }
  /* Hint cards */
  .hint-card { border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; }
  .hint-1 { background: #fff9c4; border: 1px solid #f9e547; }
  .hint-2 { background: #e3f2fd; border: 1px solid #90caf9; }
  .hint-3 { background: #e8f5e9; border: 1px solid #a5d6a7; }
  .hint-label { font-size: 14px; font-weight: 500; color: #202124; margin-bottom: 4px; }
  .hint-text { font-size: 13px; color: #3c4043; line-height: 1.5; }
  .hint-input { width: 100%; border: none; border-bottom: 1px solid #a5d6a7; padding: 8px 0; font-size: 14px; color: #202124; outline: none; background: transparent; font-family: 'Segoe UI', Arial, sans-serif; margin-top: 6px; }
  .submit-btn { background: #7b1fa2; color: #fff; border: none; border-radius: 4px; padding: 10px 28px; font-size: 14px; cursor: pointer; font-family: 'Segoe UI', Arial, sans-serif; margin-top: 4px; }
</style>
</head>
<body>
  <div class="phone-frame">
    <div class="phone-notch"></div>
    <div class="phone-screen">
      <!-- Status bar -->
      <div class="status-bar">
        <span>9:41</span>
        <span>&#128246; &#128267;</span>
      </div>
      <!-- Form header -->
      <div class="form-header">
        <div class="form-header-inner">
          <div class="form-title">&#128209; 動態評量 &mdash; 力學篇</div>
          <div class="form-desc">依照提示一步步作答，加油！</div>
        </div>
      </div>
      <!-- Form body -->
      <div class="form-body">
        <!-- Question -->
        <div class="q-card">
          <div class="q-label">
            一個 5 kg 的物體受到 20 N 的水平力作用，求此物體的加速度為多少？（忽略摩擦力）<span class="required">*</span>
          </div>
          <input class="q-input" type="text" placeholder="輸入你的答案">
        </div>

        <!-- Hint 1 -->
        <div class="hint-card hint-1">
          <div class="hint-label">&#128161; 提示 1</div>
          <div class="hint-text">這題要用到牛頓第二定律喔！想想看，什麼公式可以連結「力」「質量」和「加速度」？</div>
        </div>

        <!-- Hint 2 -->
        <div class="hint-card hint-2">
          <div class="hint-label">&#128208; 提示 2</div>
          <div class="hint-text">公式是 <strong>F = ma</strong>，也就是 <strong>a = F &divide; m</strong><br>其中 F = 20 N，m = 5 kg</div>
        </div>

        <!-- Hint 3 -->
        <div class="hint-card hint-3">
          <div class="hint-label">&#128290; 提示 3</div>
          <div class="hint-text">a = 20 &divide; 5 = ?</div>
          <input class="hint-input" type="text" placeholder="寫出最終答案">
        </div>

        <div style="text-align: right; padding: 4px 0 12px;">
          <button class="submit-btn">提交</button>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
