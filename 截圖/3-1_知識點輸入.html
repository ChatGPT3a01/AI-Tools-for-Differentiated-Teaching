<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; width: 780px; }
  .toolbar { background: #f0f4f0; padding: 4px 8px; border-bottom: 1px solid #c0c0c0; }
  .toolbar .title { color: #188038; font-size: 18px; font-weight: 500; }
  .sheet-grid { padding: 0; }
  .sheet-grid table { border-collapse: collapse; width: 100%; font-size: 13px; }
  .sheet-grid th, .sheet-grid td { border: 1px solid #e2e2e2; padding: 8px 12px; text-align: left; }
  .col-header { background: #f3f3f3; color: #5f6368; font-weight: 600; text-align: center; font-size: 12px; }
  .header-row { background: #e8eaed; font-weight: 600; color: #202124; font-size: 13px; }
  .row-num { background: #f8f9fa; color: #999; text-align: center; width: 30px; font-size: 11px; }
  .cell-a { width: 80px; }
  .cell-b { width: 180px; }
  .cell-c { width: 200px; }
  .data-row:hover { background: #f1f3f4; }
  .sheet-tabs { background: #f0f0f0; padding: 4px 8px; display: flex; gap: 2px; border-top: 1px solid #c0c0c0; }
  .tab { background: #fff; border: 1px solid #c0c0c0; border-bottom: none; padding: 6px 16px; font-size: 12px; border-radius: 4px 4px 0 0; cursor: default; }
  .tab.active { border-bottom: 2px solid #4285f4; font-weight: 500; color: #1a73e8; }
  .formula-bar { background: #fff; padding: 4px 8px; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 8px; font-size: 13px; color: #5f6368; }
  .formula-bar .cell-ref { background: #f1f3f4; padding: 2px 8px; border: 1px solid #dadce0; border-radius: 2px; font-size: 12px; min-width: 48px; text-align: center; }
  .formula-bar .fx { color: #999; font-style: italic; }
</style>
</head>
<body>
  <div class="toolbar"><span class="title">🎯 動態評量產生器</span></div>
  <div class="formula-bar">
    <span class="cell-ref">A1</span>
    <span class="fx">fx</span>
    <span>科目</span>
  </div>
  <div class="sheet-grid">
    <table>
      <tr>
        <th class="row-num"></th>
        <th class="col-header" style="width:30px;">A</th>
        <th class="col-header" style="width:30px;">B</th>
        <th class="col-header" style="width:30px;">C</th>
      </tr>
      <tr class="header-row">
        <td class="row-num">1</td>
        <td class="cell-a">科目</td>
        <td class="cell-b">單元</td>
        <td class="cell-c">知識點</td>
      </tr>
      <tr class="data-row">
        <td class="row-num">2</td>
        <td>物理</td>
        <td>牛頓運動定律</td>
        <td>F=ma 的應用</td>
      </tr>
      <tr class="data-row">
        <td class="row-num">3</td>
        <td>物理</td>
        <td>牛頓運動定律</td>
        <td>摩擦力計算</td>
      </tr>
      <tr class="data-row">
        <td class="row-num">4</td>
        <td>物理</td>
        <td>功與能</td>
        <td>動能定理</td>
      </tr>
      <tr class="data-row">
        <td class="row-num">5</td>
        <td>化學</td>
        <td>化學反應</td>
        <td>莫耳數計算</td>
      </tr>
      <tr class="data-row">
        <td class="row-num">6</td>
        <td style="color:#bdbdbd;"></td>
        <td style="color:#bdbdbd;"></td>
        <td style="color:#bdbdbd;"></td>
      </tr>
      <tr class="data-row">
        <td class="row-num">7</td>
        <td></td>
        <td></td>
        <td></td>
      </tr>
      <tr class="data-row">
        <td class="row-num">8</td>
        <td></td>
        <td></td>
        <td></td>
      </tr>
    </table>
  </div>
  <div class="sheet-tabs">
    <div class="tab active">Sheet1</div>
  </div>
</body>
</html>
