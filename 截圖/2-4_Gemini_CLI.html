<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #fff; width: 780px; }
  .terminal-window { background: #1e1e1e; border-radius: 10px; margin: 24px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
  .terminal-titlebar { background: #323233; padding: 8px 14px; display: flex; align-items: center; gap: 8px; }
  .terminal-dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green { background: #28c840; }
  .terminal-title { color: #9aa0a6; font-size: 12px; margin-left: 12px; font-family: 'Consolas', 'Courier New', monospace; }
  .terminal-body { padding: 20px 24px 28px; font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; line-height: 1.8; }
  .prompt { color: #4ec9b0; } /* cyan-ish for $ */
  .cmd { color: #6aab73; } /* green for command */
  .cmd-arg { color: #ce9178; } /* orange-ish for string argument */
  .ai-label { color: #dcdcaa; font-weight: 600; } /* yellow for AI label */
  .ai-text { color: #d4d4d4; } /* white-ish for AI response */
  .ai-bullet { color: #d4d4d4; }
  .dim { color: #6a6a6a; }
  .cursor-block { display: inline-block; width: 8px; height: 16px; background: #d4d4d4; animation: blink 1s step-end infinite; vertical-align: text-bottom; margin-left: 4px; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>
  <div class="terminal-window">
    <div class="terminal-titlebar">
      <div class="terminal-dot dot-red"></div>
      <div class="terminal-dot dot-yellow"></div>
      <div class="terminal-dot dot-green"></div>
      <span class="terminal-title">Terminal &mdash; bash</span>
    </div>
    <div class="terminal-body">
      <div><span class="prompt">$ </span><span class="cmd">gemini</span> <span class="cmd-arg">"請將以下內容改寫為適合高中一年級生的口語化版本：牛頓第二運動定律描述了物體所受淨力與其加速度之間的關係..."</span></div>
      <br>
      <div><span class="ai-label">&#129302; Gemini 回覆：</span></div>
      <br>
      <div><span class="ai-text">想像你在推購物車 &#128722;</span></div>
      <div><span class="ai-text">推的力氣越大，車子跑越快——</span></div>
      <div><span class="ai-text">這就是「牛頓第二定律」。</span></div>
      <br>
      <div><span class="ai-text">簡單說：加速度 = 力 &divide; 質量</span></div>
      <div><span class="ai-bullet">&bull; 推越用力 &#8594; 加速越快</span></div>
      <div><span class="ai-bullet">&bull; 東西越重 &#8594; 加速越慢</span></div>
      <br>
      <div><span class="prompt">$ </span><span class="cursor-block"></span></div>
    </div>
  </div>
</body>
</html>
