<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'Consolas', Arial, sans-serif; background: #fff; width: 780px; }
  .as-header { background: #4285f4; padding: 8px 16px; display: flex; align-items: center; gap: 12px; color: #fff; }
  .as-header .logo { font-size: 16px; font-weight: 500; }
  .as-toolbar { background: #f1f3f4; padding: 6px 12px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #dadce0; }
  .btn { background: #fff; border: 1px solid #dadce0; border-radius: 4px; padding: 6px 16px; font-size: 13px; color: #3c4043; cursor: pointer; }
  .btn-run { background: #f1f3f4; border: none; padding: 6px 12px; font-size: 13px; display: flex; align-items: center; gap: 6px; cursor: pointer; border-radius: 4px; }
  .btn-run:hover { background: #e8eaed; }
  .play-icon { color: #5f6368; font-size: 16px; }
  .sidebar { width: 220px; background: #f8f9fa; border-right: 1px solid #e0e0e0; padding: 12px; min-height: 50px; }
  .sidebar-title { font-size: 12px; color: #5f6368; text-transform: uppercase; margin-bottom: 8px; font-weight: 500; }
  .file-item { padding: 6px 8px; font-size: 13px; color: #3c4043; display: flex; align-items: center; gap: 8px; border-radius: 4px; cursor: pointer; }
  .file-item.active { background: #e8f0fe; color: #1a73e8; font-weight: 500; }
  .file-icon { font-size: 14px; }
  .editor { flex: 1; padding: 0; min-height: 50px; background: #fff; }
  .editor-content { padding: 12px 16px; font-family: 'Consolas', 'Courier New', monospace; font-size: 14px; line-height: 1.8; color: #333; }
  .line-num { color: #999; display: inline-block; width: 30px; text-align: right; margin-right: 16px; user-select: none; }
  .kw { color: #0000ff; }
  .fn { color: #795548; }
  .str { color: #388e3c; }
  .comment { color: #9e9e9e; font-style: italic; }
  .main-area { display: flex; }
  .callout { background: #fce8e6; border: 2px solid #ea4335; border-radius: 8px; padding: 10px 16px; font-size: 14px; color: #c5221f; font-weight: 500; margin: 12px; }
  .func-select { background: #fff; border: 1px solid #dadce0; border-radius: 4px; padding: 4px 8px; font-size: 13px; color: #3c4043; }
</style>
</head>
<body>
  <div class="as-header">
    <div class="logo">Apps Script</div>
    <span style="font-size:13px; opacity:0.8;">段考AI審題助手</span>
  </div>
  <div class="as-toolbar">
    <div class="btn-run"><span class="play-icon">▶</span> 執行</div>
    <div class="btn-run">🐛 偵錯</div>
    <span style="color:#999; font-size:13px;">函式：</span>
    <select class="func-select"><option>onOpen</option><option>myFunction</option></select>
  </div>
  <div class="main-area">
    <div class="sidebar">
      <div class="sidebar-title">檔案</div>
      <div class="file-item active">
        <span class="file-icon">{ }</span> Code.gs
      </div>
    </div>
    <div class="editor">
      <div class="editor-content">
        <div><span class="line-num">1</span><span class="kw">function</span> <span class="fn">myFunction</span>() {</div>
        <div><span class="line-num">2</span>  </div>
        <div><span class="line-num">3</span>}</div>
        <div><span class="line-num">4</span></div>
      </div>
      <div class="callout">👆 把這裡的預設內容全部刪除（Ctrl+A → Delete），然後貼上我們的程式碼</div>
    </div>
  </div>
</body>
</html>
