<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Google Sans', 'Segoe UI', Arial, sans-serif; background: #fff; width: 780px; }
  .header { background: #fff; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e0e0e0; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 30px; height: 30px; background: linear-gradient(135deg, #669df6, #4285f4); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 14px; font-weight: bold; }
  .logo-text { font-size: 18px; color: #202124; font-weight: 500; }
  .logo-text span { color: #5f6368; font-weight: 400; font-size: 14px; margin-left: 4px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .header-btn { padding: 8px 16px; border: 1px solid #dadce0; border-radius: 20px; font-size: 13px; color: #5f6368; background: #fff; cursor: pointer; }
  .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #1a73e8; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; }
  .main { display: flex; min-height: 50px; }
  .sidebar { width: 260px; background: #f8f9fa; border-right: 1px solid #e0e0e0; padding: 20px 16px; }
  .sidebar-title { font-size: 13px; color: #5f6368; font-weight: 500; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .add-source-btn { display: flex; align-items: center; gap: 8px; padding: 10px 16px; background: #1a73e8; color: #fff; border: none; border-radius: 24px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; justify-content: center; margin-bottom: 20px; }
  .source-types { margin-top: 16px; }
  .source-type { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 13px; color: #3c4043; cursor: pointer; margin-bottom: 4px; }
  .source-type:hover { background: #e8eaed; }
  .source-type-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
  .icon-gdoc { background: #e8f0fe; color: #1a73e8; }
  .icon-pdf { background: #fce8e6; color: #ea4335; }
  .icon-web { background: #e6f4ea; color: #34a853; }
  .icon-text { background: #fef7e0; color: #f9ab00; }
  .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
  .notebook-title-input { font-size: 24px; color: #202124; border: none; border-bottom: 2px solid #1a73e8; padding: 8px 4px; width: 360px; text-align: center; font-weight: 500; margin-bottom: 32px; outline: none; background: transparent; }
  .upload-zone { width: 420px; border: 2px dashed #dadce0; border-radius: 12px; padding: 48px 32px; text-align: center; background: #fafafa; }
  .upload-zone:hover { border-color: #1a73e8; background: #f0f4ff; }
  .upload-icon { font-size: 48px; margin-bottom: 16px; color: #dadce0; }
  .upload-title { font-size: 16px; color: #3c4043; font-weight: 500; margin-bottom: 8px; }
  .upload-desc { font-size: 13px; color: #5f6368; }
  .upload-btn { display: inline-block; margin-top: 16px; padding: 8px 24px; background: #1a73e8; color: #fff; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .supported { margin-top: 20px; display: flex; gap: 16px; justify-content: center; }
  .supported-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #5f6368; }
  .callout { margin: 20px 24px; background: #e8f0fe; border-left: 4px solid #1a73e8; border-radius: 4px; padding: 12px 16px; font-size: 14px; color: #1a73e8; }
</style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <div class="logo-icon">N</div>
      <div class="logo-text">NotebookLM <span>by Google</span></div>
    </div>
    <div class="header-right">
      <div class="header-btn">說明</div>
      <div class="user-avatar">T</div>
    </div>
  </div>

  <div class="main">
    <div class="sidebar">
      <div class="sidebar-title">來源</div>
      <button class="add-source-btn">＋ 新增來源</button>

      <div class="source-types">
        <div style="font-size: 12px; color: #80868b; margin-bottom: 10px;">支援的來源類型：</div>
        <div class="source-type">
          <div class="source-type-icon icon-gdoc">📝</div>
          Google 文件
        </div>
        <div class="source-type">
          <div class="source-type-icon icon-pdf">📕</div>
          PDF 檔案
        </div>
        <div class="source-type">
          <div class="source-type-icon icon-web">🌐</div>
          網頁連結
        </div>
        <div class="source-type">
          <div class="source-type-icon icon-text">📋</div>
          複製貼上文字
        </div>
      </div>

      <div style="margin-top: 24px; padding: 12px; background: #fff; border-radius: 8px; border: 1px solid #e0e0e0;">
        <div style="font-size: 11px; color: #80868b; margin-bottom: 4px;">小提示</div>
        <div style="font-size: 12px; color: #5f6368; line-height: 1.6;">
          每個筆記本最多可上傳 <b>50 個來源</b>，支援 PDF、Google 文件、網頁等格式。
        </div>
      </div>
    </div>

    <div class="content">
      <input class="notebook-title-input" value="新增筆記本" readonly>

      <div class="upload-zone">
        <div class="upload-icon">☁️</div>
        <div class="upload-title">將檔案拖放至此，或點擊上傳</div>
        <div class="upload-desc">支援 PDF、Google 文件、網頁連結、純文字</div>
        <div class="upload-btn">選擇檔案</div>
      </div>

      <div class="supported">
        <div class="supported-item">📄 .pdf</div>
        <div class="supported-item">📝 .gdoc</div>
        <div class="supported-item">🌐 URL</div>
        <div class="supported-item">📋 Text</div>
      </div>
    </div>
  </div>

  <div class="callout">
    👆 點「新增來源」→ 上傳你的課本 PDF、講義、Rubric，讓 NotebookLM 成為你的教學助理！
  </div>
</body>
</html>
